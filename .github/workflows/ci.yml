name: CI

on:
  push:
    branches: [main, s1-dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Frontend ────────────────────────────────────────────────────────────
      # npm ci requires a lockfile built on the same platform (Linux-specific
      # optional deps from jsdom are absent from the Windows-generated lockfile).
      # npm install reads package.json and installs correct versions on any OS.
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Test frontend
        run: npm test --if-present
        working-directory: frontend

      # ── Backend ─────────────────────────────────────────────────────────────
      # tree-sitter native modules require build tools
      - name: Install backend build tools
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Test backend
        run: npm test --if-present
        working-directory: backend
